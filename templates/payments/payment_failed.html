<!-- payments/payment_failed.html -->
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فشل الدفع</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .error-icon {
            font-size: 4em;
            margin-bottom: 20px;
            animation: shake 0.8s ease-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        h1 {
            color: #f44336;
            font-size: 2.5em;
            margin: 0 0 20px 0;
        }
        
        .payment-details {
            background: #fff5f5;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 4px solid #f44336;
        }
        
        .btn {
            background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">❌</div>
        <h1>فشل في الدفع</h1>
        <p>عذراً، لم تتم معالجة دفعتك بنجاح</p>
        
        {% if payment %}
        <div class="payment-details">
            <p><strong>رقم العملية:</strong> {{ payment.moyasar_id }}</p>
            <p><strong>الحالة:</strong> {{ payment.status }}</p>
            <p><strong>التاريخ:</strong> {{ payment.created_at|date:"d M Y H:i" }}</p>
        </div>
        {% endif %}
        
        <div>
            <a href="/payments/create/" class="btn">
                🔄 إعادة المحاولة
            </a>
            <a href="/" class="btn btn-secondary">
                🏠 العودة للرئيسية
            </a>
        </div>
        
        <p style="margin-top: 30px; color: #666; font-size: 0.9em;">
            إذا كنت تواجه مشاكل متكررة، يرجى التواصل مع الدعم الفني
        </p>
    </div>
</body>
</html>
