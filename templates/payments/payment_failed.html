{% load static %}

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فشل الدفع</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Tajawal', sans-serif;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .error-icon {
            font-size: 70px;
            color: #dc3545;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 text-center" style="max-width: 500px;">
    <div class="error-icon mb-3">❌</div>
    <h2 class="mb-3">فشل الدفع</h2>
    <p class="text-muted">للأسف، لم تكتمل عملية الدفع. يرجى المحاولة مرة أخرى.</p>

    <hr>
    <h5>تفاصيل المحاولة</h5>
    <ul class="list-group text-end">
        <li class="list-group-item">رقم العملية: <strong>{{ payment.moyasar_id }}</strong></li>
        <li class="list-group-item">المبلغ: <strong>{{ payment.amount }} {{ payment.currency }}</strong></li>
        <li class="list-group-item">الحالة: <strong>{{ payment.status }}</strong></li>
    </ul>

</div>

</body>
</html>
