<!-- payments/invoice_not_found.html -->
<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفاتورة غير موجودة</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .not-found-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .not-found-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #ff9800;
            font-size: 2.5em;
            margin: 0 0 20px 0;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="not-found-container">
        <div class="not-found-icon">📄❓</div>
        <h1>الفاتورة غير موجودة</h1>
        <p>{{ error|default:"الفاتورة المطلوبة غير موجودة أو تم حذفها" }}</p>
        
        <div>
            <a href="/payments/my-invoices/" class="btn">
                📋 فواتيري
            </a>
            <a href="/" class="btn">
                🏠 العودة للرئيسية
            </a>
        </div>
    </div>
</body>
</html>
